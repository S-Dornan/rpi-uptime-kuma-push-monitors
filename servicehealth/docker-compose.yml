services:
  uptime-kuma-push:
    image: curlimages/curl:latest
    container_name: uptime-kuma-push
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        while true; do
          curl -s -H "CF-Access-Client-Id: ${CF_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" "${PUSH_URL}"
          sleep ${PUSH_INTERVAL}
        done
