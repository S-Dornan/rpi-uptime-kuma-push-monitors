name: Build and Push Undervoltage Monitor

on:
  workflow_dispatch: # Manual trigger via GitHub Actions

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Source SBOM
        run: |
          curl -Lo $RUNNER_TEMP/sbom-tool https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-linux-x64
          chmod +x $RUNNER_TEMP/sbom-tool
          
          # Adjusted paths to scan the root directory instead of ./brownout
          $RUNNER_TEMP/sbom-tool generate -b ./undervoltage -bc ./undervoltage -pn PiProdBase -pv 1.0.0 -ps S-Dornan -nsb https://github.com/${{ github.repository }}/sbom/pi-push-monitor-base -V Verbose

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-sbom-manifest
          path: ./undervoltage/_manifest
        
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/pi-push-monitor-base
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest-undervoltage,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./undervoltage # Tells Docker to look inside the undervoltage folder for the Dockerfile
          platforms: linux/arm64 # Or linux/arm/v7 if you are on 32-bit Pi OS
          push: true
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
